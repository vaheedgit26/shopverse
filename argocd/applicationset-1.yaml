apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet

metadata:
  name: shopverse-dev-applicationset
  namespace: argocd

spec:
  generators:
    # =========================================
    # 🌍 PLATFORM (STATIC - STILL SEPARATE)
    # =========================================
    - list:
        elements:
          - name: platform
            appPath: platform/global-config
            wave: "-1"
            project: shopverse
            env: dev
            repoURL: https://github.com/vaheedgit26/shopverse.git

    # *************************************************************************************** #

    - matrix:
        generators:

          # ===========================================================
          # 🌍 COMMON SHARED VALUES
          # ===========================================================
          - list:
              elements:
                - project: shopverse
                  env: dev
                  repoURL: https://github.com/vaheedgit26/shopverse.git

          # ===========================================================
          # 🚀 SERVICES (AUTO DISCOVERY)
          # ===========================================================
          - git:
              repoURL: https://github.com/vaheedgit26/shopverse.git
              revision: HEAD
              files:
                - path: apps/*/Chart.yaml
              template:
                values:
                  name: '{{path.dirname | base}}'
                  appPath: '{{path.dirname}}'
                  wave: "0"

  # =========================================
  # 🎯 COMMON TEMPLATE (NO HARDCODING)
  # =========================================
  template:
    metadata:
      name: '{{name}}'
      namespace: argocd

      labels:
        env: '{{env}}'
        project: '{{project}}'
        component: '{{name}}'
        app.kubernetes.io/part-of: '{{project}}'

      annotations:
        argocd.argoproj.io/sync-wave: '{{wave}}'

    spec:
      project: '{{project}}-{{env}}'

      source:
        repoURL: '{{repoURL}}'
        targetRevision: HEAD
        path: '{{appPath}}'
        helm:
          releaseName: '{{project}}-{{env}}-{{name}}'
          valueFiles:
            - values.yaml

      destination:
        server: https://kubernetes.default.svc
        namespace: '{{project}}-{{env}}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true
          - PruneLast=true
