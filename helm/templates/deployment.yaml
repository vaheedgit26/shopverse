apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.deployment.name }}                   # {{ .Release.Name }}
  # namespace: {{ .Values.namespace }}
  {{- with .Values.labels }}
  labels:
  {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.deployment.replicas | default 1 }}
  {{- end }}
  selector:
    {{- with .Values.labels }}
    matchLabels:
    {{- toYaml . | nindent 6 }}
    {{- end }}
  template:
    metadata:
      {{- with .Values.labels }}
      labels:
      {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.annotations }}
      annotations:
      {{- toYaml . | nindent 8 }}
      {{- end }}  
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- else }}
      serviceAccountName: default
      {{- end }}
      
      {{- with .Values.podSecurityContext }}
      securityContext:
      {{- toYaml . | nindent 8 }}
      {{- end }}
      
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: {{ .Values.containerName | default "backend" }}  # backend
          image: "{{ include "shopverse.backend.image" . }}"
          imagePullPolicy: {{ .Values.imagePullPolicy | default "IfNotPresent" }}   # Always # IfNotPresent 
          ports:
            - containerPort: {{ .Values.service.targetPort }} # 8080
              protocol: TCP
              
          {{- with .Values.containerSecurityContext }}
          securityContext:
          {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.envFrom }}
          envFrom:
          {{- toYaml . | nindent 12 }}
          {{- end }}
          
          {{- with .Values.resources }}      
          resources:
          {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.probes.startupProbe }}
          startupProbe:
          {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.probes.readinessProbe }}
          readinessProbe:
          {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.probes.livenessProbe }}
          livenessProbe:
          {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.volumeMounts }}
          volumeMounts:
          {{- toYaml . | nindent 12 }}
          {{- end }}
          
      {{- with .Values.volumes }}    
      volumes:
      {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
      {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.affinity }}
      affinity:
      {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
      {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
      {{- toYaml . | nindent 8 }}
      {{- end }}
