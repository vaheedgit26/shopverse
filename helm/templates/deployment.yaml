apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.deployment.name }}                   # {{ .Release.Name }}
  # namespace: {{ .Values.namespace }}

  {{- with .Values.labels }}
  labels:
  {{- toYaml . | nindent 4 }}
  {{- end }}

spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.deployment.replicas | default 1 }}
  {{- end }}
  selector:
    {{- with .Values.labels }}
    matchLabels:
    {{- toYaml . | nindent 6 }}
    {{- end }}
  template:
    metadata:
      {{- with .Values.labels }}
      labels:
      {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.annotations }}
      {{- if and .enabled .data }}
      annotations:
      {{- toYaml .data | nindent 8 }}
      {{- end }}
      {{- end }} 

    spec:
      {{- with .Values.imagePullSecrets }}
      {{- if and .enabled .data }}
      imagePullSecrets:
      {{- toYaml .data | nindent 8 }}
      {{- end }}
      {{- end }}
      
      {{- with .Values.serviceAccount }}
      {{- if and .create .data }}
      serviceAccountName: {{ .Values.serviceAccount.data.name }}
      {{- else }}
      serviceAccountName: default
      {{- end }}
      {{- end }}
      
      {{- with .Values.podSecurityContext }}
      {{- if and .enabled .data }}
      securityContext:
      {{- toYaml .data | nindent 8 }}
      {{- end }}
      {{- end }}
      
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: {{ .Values.containerName | default "backend" }}  # backend
          image: '{{ include "shopverse.backend.image" . }}'
          imagePullPolicy: {{ .Values.imagePullPolicy | default "IfNotPresent" }}   # Always # IfNotPresent 
          ports:
            - containerPort: {{ .Values.service.targetPort }} # 8080
              protocol: TCP
              
          {{- with .Values.containerSecurityContext }}
          {{- if and .enabled .data }}
          securityContext:
          {{- toYaml .data | nindent 12 }}
          {{- end }}
          {{- end }}

          {{- with .Values.envFrom }}
          {{- if and .enabled .data }}
          envFrom:
          {{- toYaml .data | nindent 12 }}
          {{- end }}
          {{- end }}
          
          {{- with .Values.resources }}  
          {{- if and .enabled .data }}    
          resources:
          {{- toYaml .data | nindent 12 }}
          {{- end }}
          {{- end }}

          {{- with .Values.startupProbe }}
          {{- if and .enabled .data }}
          startupProbe:
          {{- toYaml .data | nindent 12 }}
          {{- end }}
          {{- end }}

          {{- with .Values.readinessProbe }}
          {{- if and .enabled .data }}
          readinessProbe:
          {{- toYaml .data | nindent 12 }}
          {{- end }}
          {{- end }}

          {{- with .Values.livenessProbe }}
          {{- if and .enabled .data }}
          livenessProbe:
          {{- toYaml .data | nindent 12 }}
          {{- end }}
          {{- end }}

          {{- with .Values.volumeMounts }}
          {{- if and .enabled .data }}
          volumeMounts:
          {{- toYaml .data | nindent 12 }}
          {{- end }}
          {{- end }}
          
      {{- with .Values.volumes }}
      {{- if and .enabled .data }}    
      volumes:
      {{- toYaml .data | nindent 8 }}
      {{- end }}
      {{- end }}

      {{- with .Values.nodeSelector }}
      {{- if and .enabled .data }}
      nodeSelector:
      {{- toYaml .data | nindent 8 }}
      {{- end }}
      {{- end }}

      {{- with .Values.affinity }}
      {{- if and .enabled .data }}
      affinity:
      {{- toYaml .data | nindent 8 }}
      {{- end }}
      {{- end }}

      {{- with .Values.tolerations }}
      {{- if and .enabled .data }}
      tolerations:
      {{- toYaml .data | nindent 8 }}
      {{- end }}
      {{- end }}

      {{- with .Values.topologySpreadConstraints }}
      {{- if and .enabled .data }}
      topologySpreadConstraints:
      {{- toYaml .data | nindent 8 }}
      {{- end }}
      {{- end }}
