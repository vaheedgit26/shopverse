namespace: shopverse-dev
# ──────────────────────────────────────--------------------------
# BASE Ingress
# ──────────────────────────────────────--------------------------
baseIngress:
  enabled: false
  name: shopverse-base-ingress
  ingressClassName: alb

  path: /health
  pathType: Prefix
  serviceName: frontend-svc
  servicePort: 8080
  
  annotations: 
    # ALB Exposure
    alb.ingress.kubernetes.io/scheme: internet-facing
    
    # Target pods directly
    alb.ingress.kubernetes.io/target-type: ip
    
    # HTTP + HTTPS listeners
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/ip-address-type: ipv4

    # ALB to Kubernetes service protocol
    alb.ingress.kubernetes.io/backend-protocol: HTTP

    # Health check (default fallback)
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port

    # Performance / Timeouts
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=60

    # Optional tuning (recommended)
    alb.ingress.kubernetes.io/success-codes: "200"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "2"
    
    # Grouping (very important for multiple ingresses)
    alb.ingress.kubernetes.io/group.name: shopverse-dev      # This should be same in all the ingress.yaml files to collaboratively create single ALB

    # Highest priority
    alb.ingress.kubernetes.io/group.order: "0"

    # ACM Certificate
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:REGION:ACCOUNT:certificate/XXXX

    # Force HTTPS
    # alb.ingress.kubernetes.io/ssl-redirect: "443"

    # WAF (optional but real-world)
    # alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:REGION:ACCOUNT:regional/webacl/XXXX

# ──────────────────────────────────────--------------------------
# BACKEND Ingress
# ──────────────────────────────────────--------------------------
backendIngress:
  enabled: false
  name: shopverse-backend-ingress
  ingressClassName: alb
  
  path: /api
  pathType: Prefix
  serviceName: backend-svc
  servicePort: 8080

  annotations:
    # Backend-specific health check
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port
  
    # This is important to mix all the service ingresses and form one complete ingress
    alb.ingress.kubernetes.io/group.name: shopverse-dev    # This should be same in all the ingress.yaml files to collaboratively create single ALB

    alb.ingress.kubernetes.io/group.order: "1"   # 🔥 higher priority

# ──────────────────────────────────────--------------------------
# FRONTEND Ingress
# ──────────────────────────────────────--------------------------
frontendIngress:
  enabled: false
  name: shopverse-frontend-ingress
  ingressClassName: alb
  
  path: /
  pathType: Prefix
  serviceName: frontend-svc
  servicePort: 8080
  

  annotations:
    # Backend-specific health check
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port
    
    # This is important to mix all the service ingresses and form one complete ingress
    alb.ingress.kubernetes.io/group.name: shopverse-dev    # This should be same in all the ingress.yaml files to collaboratively create single ALB

    alb.ingress.kubernetes.io/group.order: "2"   # 🔥 lower priority
