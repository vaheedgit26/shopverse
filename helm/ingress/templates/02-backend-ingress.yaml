{{- if .Values.backendIngress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.backendIngress.name }}                            # shopverse-backend-ingress
  namespace: {{ .Values.namespace }}
  {{- with .Values.backendIngress.annotations }}
  annotations:
  {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.backendIngress.ingressClassName }}    # alb
  rules:
    - http:
        paths:
          - path: {{ .Values.backendIngress.path }}                  # /api
            pathType: {{ .Values.backendIngress.pathType }}          # Prefix
            backend:
              service:
                name: {{ .Values.backendIngress.serviceName }}       # backend-svc
                port:
                  number: {{ .Values.backendIngress.servicePort }}   # 8080
{{- end }}
