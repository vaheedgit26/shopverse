{{- if .Values.baseIngress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.baseIngress.name }}                            # shopverse-base-ingress
  namespace: {{ .Values.namespace }}
  {{- with .Values.baseIngress.annotations }}
  annotations:
  {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.baseIngress.ingressClassName }}    # alb

  # Atleast one rule required to create ALB
  rules:
    - http:
        paths:
          - path: {{ .Values.baseIngress.path }}                 # /health
            pathType: {{ .Values.baseIngress.pathType }}         # Prefix
            backend:
              service:
                name: {{ .Values.baseIngress.serviceName }}      # frontend-svc
                port:
                  number: {{ .Values.baseIngress.servicePort }}  # 8080
{{- end }}
