{{- if .Values.frontendIngress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.frontendIngress.name }}                          # shopverse-frontend-ingress
  namespace: {{ .Values.namespace }}
  {{- with .Values.frontendIngress.annotations }}
  annotations:
  {{- toYaml . | nindent 4 }}
  {{- end }}     
spec:
  ingressClassName: {{ .Values.frontendIngress.ingressClassName }}  # alb
  rules:
    - http:
        paths:
          - path: {{ .Values.frontendIngress.path }}                # /
            pathType: {{ .Values.frontendIngress.pathType }}        # Prefix
            backend:
              service:
                name: {{ .Values.frontendIngress.name }}            # frontend-svc
                port:
                  number: {{ .Values.frontendIngress.port }}        # 8080
{{- end }}
