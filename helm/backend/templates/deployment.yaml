apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.deployment.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: shopverse
    component: backend
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels:
      app: shopverse
      component: backend
  template:
    metadata:
      labels:
        app: shopverse
        component: backend
    spec:
      containers:
        - name: backend
          image: "{{ include "shopverse.backend.image" . }}"
          imagePullPolicy: Always        # IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Values.configmap.name }}  # shopverse-config
            - secretRef:
                name: {{ .Values.secret.name }}     # shopverse-dev-mysql-jwt-credentials
                
          {{- with .Values.resources }}      
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.probes.startupProbe }}
          startupProbe:
            {{ toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.probes.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.probes.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

            
