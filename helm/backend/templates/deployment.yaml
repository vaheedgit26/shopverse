apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.deployment.name }}   # {{ .Release.Name }}
  namespace: {{ .Values.namespace }}
  {{- with .Values.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
    {{- with .Values.labels }}
    matchLabels:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  template:
    metadata:
      {{- with .Values.labels }}
      labels:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      # imagePullSecrets:
      # serviceAccountName: {{ include "pharma-service.serviceAccountName" . }}
      # securityContext:
      # terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ include "shopverse.backend.image" . }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}   # Always # IfNotPresent (default)
          ports:
            - containerPort: {{ .Values.service.targetPort }} # 8080
              protocol: TCP
              
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- if or .Values.configmap.name .Values.secret.name }}
          envFrom:
            {{- with .Values.configmap.name }}
            - configMapRef:
                name: {{ . }}  # shopverse-config
            {{- end }}
            
            {{- with .Values.secret.name }}    
            - secretRef:
                name: {{ . }}  # shopverse-dev-mysql-jwt-credentials
            {{- end }}
          {{- end }}
                
          {{- with .Values.resources }}      
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.probes.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.probes.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.probes.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
