apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.deployment.name }}
  namespace: {{ .Values.namespace }}
  {{- with .Values.labels }}
  labels:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
    {{- with .Values.labels }}
    matchLabels:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  template:
    metadata:
      {{- with .Values.labels }}
      labels:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      containers:
        - name: backend
          image: "{{ include "shopverse.backend.image" . }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}   # Always # IfNotPresent (default)
          ports:
            - containerPort: {{ .Values.service.targetPort }} # 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Values.configmap.name }}  # shopverse-config
            - secretRef:
                name: {{ .Values.secret.name }}     # shopverse-dev-mysql-jwt-credentials
                
          {{- with .Values.resources }}      
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.probes.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.probes.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.probes.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

            
